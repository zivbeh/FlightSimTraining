<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Sim Training</title>
    <link rel="stylesheet" href="style.css">

    
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
          }
        }
    </script>
    
    <script type="module" src="src/main.js" defer></script>
</head>
<body>
    
    

    <div class="container">
        <div id="viewport">
            <canvas id="bg" class="canvas"></canvas>
            <button id="restartBtn">Restart</button>
            <div id="speedometer">
                <div class="speed-label">SPEED</div>
                <div class="speed-needle"></div>
                <div class="speed-value">0.00</div>
                <div class="speed-unit">m/s</div>
            </div>
            
            <div id="altimeter">
                <div class="alt-label">ALT</div>
                <div class="alt-bar-container">
                    <div class="alt-bar-fill"></div>
                </div>
                <div class="alt-value">0</div>
                <div class="alt-unit">m</div>
            </div>
        </div>

        <div id="splitter" aria-label="Resize panel" role="separator"></div>
        <div id="right-panel">
            
            <div id="editor-section">
                <div class="toolbar">
                    <button id="runBtn">Run Code</button>
                    <span class="file-name">main.js</span>
                </div>
                
                <div class="editor-wrapper">
                    <div id="line-numbers">1</div>
                    <div class="input-container">
                        <pre id="highlight-layer" aria-hidden="true"></pre>
                        <textarea id="codeEditor" spellcheck="false"></textarea>
                    </div>
            </div>

            <div id="console-section">
                <div class="console-header">Console</div>
                <div id="console">-- System Ready --</div>
            </div>

        </div>
    </div>

</body>
</html>
